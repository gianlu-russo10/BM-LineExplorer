<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Home - BM Driver Aid</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #FF5900;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* Barra superiore */
    .top-bar {
      background: white;
      width: 90%;
      max-width: 900px;
      margin-top: 40px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);

      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .top-bar h2 {
      margin: 0;
      font-size: 22px;
      color: #000000;
    }

    /* Box Esci */
    .logout-box {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border: 2px solid red;
      border-radius: 8px;
      cursor: pointer;
      color: red;
      font-weight: bold;
      background: #fff;
      transition: 0.2s;
    }

    .logout-box:hover {
      background: #ffe5e5;
    }

    .logout-box svg {
      stroke: red;
    }

    /* Box generico */
    .line-box {
      background: white;
      width: 90%;
      max-width: 900px;
      margin-top: 20px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    .line-box:hover {
      background: #f7f7f7;
    }

    .line-box h3 {
      margin: 0;
      font-size: 20px;
      color: #000000;
    }

    .line-box hr {
      border: none;
      border-top: 2px solid #000000;
      margin: 15px 0;
    }
  </style>
</head>

<body>

  <!-- Barra superiore -->
  <div class="top-bar">
    <div>
      <h2 style="margin: 0;">Bike Mobility - Driver Aid</h2>
      <h4 style="margin: 5px 0 0 0; font-weight: normal; color: #444;">
        Benvenuto
      </h4>
    </div>

    <div class="logout-box" onclick="logout()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      Esci
    </div>
  </div>


  <!-- Box Linee -->
  <div class="line-box" onclick="goToPage('linee.html')">
    <h3>Linee e fermate</h3>
  </div>

  <!-- Box Turni Macchina -->
  <div class="line-box" onclick="goToPage('TM.html')">
    <h3>Turni Macchina</h3>
  </div>

  <!-- Box Ordini di Servizio -->
  <div class="line-box" onclick="goToPage('OdS.html')">
    <h3>Ordini di Servizio</h3>
  </div>


  <script>
    function logout() {
      window.location.href = "index.html";
    }

    function goToPage(url) {
      window.location.href = url;
    }
  </script>

</body>
</html>
